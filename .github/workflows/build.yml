name: Minify CSS

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  minify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install minifier
        run: npm install -g clean-css-cli

      - name: Minify CSS
        run: |
          mkdir -p dist
          cleancss -o dist/minima.min.css src/minima.css

      - name: Commit minified file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dist/mylib.min.css
          git diff --staged --quiet || git commit -m "chore: rebuild minified CSS [skip ci]"
          git push
