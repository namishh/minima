name: Minify CSS & JS

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install minifiers
        run: |
          npm install -g clean-css-cli
          npm install -g terser

      - name: Minify CSS
        run: |
          mkdir -p dist
          cleancss -o dist/minima.min.css src/minima.css

      - name: Minify JS
        run: terser src/minima.js -o dist/minima.min.js --compress --mangle

      - name: Commit minified files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dist/minima.min.css dist/minima.min.js
          git diff --staged --quiet || git commit -m "chore: rebuild minified files [skip ci]"
          git push
